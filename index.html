<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Restaurant</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: #0f0f0f;
  color: white;
}

header {
  height: 100vh;
  background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)),
  url('https://images.unsplash.com/photo-1555992336-03a23c6f5d71');
  background-size: cover;
  background-position: center;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

header h1 {
  font-size: 60px;
  letter-spacing: 2px;
}

header p {
  margin-top: 10px;
  font-size: 18px;
  color: #ccc;
}

.btn {
  margin-top: 20px;
  padding: 12px 30px;
  background: #ff4d4d;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 30px;
  font-size: 16px;
}

section {
  padding: 60px 20px;
  text-align: center;
}

h2 {
  margin-bottom: 20px;
  font-size: 32px;
}

.menu {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: #1c1c1c;
  padding: 20px;
  border-radius: 15px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
}

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
}

.gallery img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

footer {
  background: #111;
  padding: 30px;
  text-align: center;
  font-size: 14px;
  color: #aaa;
}
</style>
</head>

<body>

<header>
  <div>
    <h1>YOUR RESTAURANT</h1>
    <p>Delicious food. Premium experience.</p>
    <button class="btn">View Menu</button>
  </div>
</header>

<section>
  <h2>Our Menu</h2>
  <div class="menu">
    <div class="card">🍗 Chicken Biriyani - ₹180</div>
    <div class="card">🍔 Zinger Burger - ₹150</div>
    <div class="card">🍝 Pasta - ₹200</div>
    <div class="card">🥤 Fresh Juice - ₹80</div>
  </div>
</section>

<section>
  <h2>Gallery</h2>
  <div class="gallery">
    <img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">
    <img src="https://images.unsplash.com/photo-1540189549336-e6e99c3679fe">
    <img src="https://images.unsplash.com/photo-1550547660-d9450f859349">
  </div>
</section>

<section>
  <h2>Contact Us</h2>
  <p>📞 9876543210</p>
  <p>📍 Your Location</p>
</section>

<footer>
  © 2026 Your Restaurant. All rights reserved.
</footer>

</body>
</html>
